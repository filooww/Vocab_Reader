<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="150" viewBox="0 0 1200 150" fill="none" role="img" aria-label="What it does">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1310"/><stop offset="0.5" stop-color="#211810"/><stop offset="1" stop-color="#11201d"/>
    </linearGradient>
    <style>.h{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-weight:800;} .p{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="150" rx="16" fill="url(#fbg)"/>
  <rect width="1200" height="150" rx="16" fill="none" stroke="#df7142" stroke-opacity="0.2" stroke-width="2"/>

  <text class="h" x="600" y="58" text-anchor="middle" font-size="30" fill="#df7142">What it does
    <animate attributeName="opacity" values="0;1" dur="0.7s" fill="freeze"/>
  </text>

  <!-- four pillars, staggered fade-in + slight rise -->
  <g class="p" font-size="17" text-anchor="middle" fill="#e9e2d8">
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 10;0 0" dur="0.5s" begin="0.5s" fill="freeze"/>
      <text x="180" y="104">📖 Reading</text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 10;0 0" dur="0.5s" begin="0.8s" fill="freeze"/>
      <text x="450" y="104">✍️ IELTS Writing</text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 10;0 0" dur="0.5s" begin="1.1s" fill="freeze"/>
      <text x="740" y="104">🎙️ IELTS Speaking</text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.4s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 10;0 0" dur="0.5s" begin="1.4s" fill="freeze"/>
      <text x="1010" y="104">🎓 SAT R&amp;W</text></g>
  </g>

  <!-- separator dots between pillars -->
  <g fill="#df7142" opacity="0.5"><animate attributeName="opacity" values="0;0.5" dur="0.6s" begin="1.6s" fill="freeze"/>
    <circle cx="315" cy="98" r="2.5"/><circle cx="595" cy="98" r="2.5"/><circle cx="875" cy="98" r="2.5"/>
  </g>

  <line x1="500" y1="128" x2="700" y2="128" stroke="#1f5e54" stroke-width="3" stroke-linecap="round" stroke-dasharray="200" stroke-dashoffset="200">
    <animate attributeName="stroke-dashoffset" values="200;0" dur="1s" begin="1.6s" fill="freeze"/>
  </line>
</svg>
