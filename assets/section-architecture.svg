<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="170" viewBox="0 0 1200 170" fill="none" role="img" aria-label="Under the hood">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11201d"/><stop offset="0.5" stop-color="#1a1310"/><stop offset="1" stop-color="#211810"/>
    </linearGradient>
    <style>.h{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-weight:800;} .n{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="170" rx="16" fill="url(#abg)"/>
  <rect width="1200" height="170" rx="16" fill="none" stroke="#1f5e54" stroke-opacity="0.3" stroke-width="2"/>

  <text class="h" x="600" y="44" text-anchor="middle" font-size="26" fill="#2f8b7c">Under the hood
    <animate attributeName="opacity" values="0;1" dur="0.7s" fill="freeze"/>
  </text>

  <!-- nodes -->
  <g class="n" font-size="14" text-anchor="middle">
    <g><rect x="70"  y="92" width="200" height="46" rx="10" fill="#241a14" stroke="#df7142" stroke-opacity="0.5"/>
       <text x="170" y="120" fill="#e9e2d8">Browser · vanilla JS</text></g>
    <g><rect x="500" y="92" width="200" height="46" rx="10" fill="#241a14" stroke="#df7142" stroke-opacity="0.7"/>
       <text x="600" y="120" fill="#e9e2d8">Node · Express</text></g>
    <g><rect x="800" y="92" width="150" height="46" rx="10" fill="#241a14" stroke="#1f5e54" stroke-opacity="0.7"/>
       <text x="875" y="120" fill="#e9e2d8">AI (BYO key)</text></g>
    <g><rect x="980" y="92" width="150" height="46" rx="10" fill="#241a14" stroke="#1f5e54" stroke-opacity="0.7"/>
       <text x="1055" y="120" fill="#e9e2d8">Upstash Redis</text></g>
  </g>

  <!-- connecting lines -->
  <g stroke="#df7142" stroke-opacity="0.35" stroke-width="2">
    <line x1="270" y1="115" x2="500" y2="115"/>
    <line x1="700" y1="115" x2="800" y2="115"/>
    <line x1="700" y1="115" x2="980" y2="115"/>
  </g>

  <!-- data pulses flowing along the request path -->
  <circle r="4" fill="#df7142">
    <animate attributeName="cx" values="270;500" dur="1.4s" begin="0s;3s;6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="115;115" dur="1.4s" begin="0s;3s;6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.4s" begin="0s;3s;6s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#2f8b7c">
    <animate attributeName="cx" values="700;875" dur="1.1s" begin="1.4s;4.4s;7.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.1s" begin="1.4s;4.4s;7.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="115" r="4" fill="#2f8b7c">
    <animate attributeName="cx" values="700;980" dur="1.1s" begin="1.4s;4.4s;7.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.1s" begin="1.4s;4.4s;7.4s" repeatCount="indefinite"/>
  </circle>

  <text class="n" x="600" y="160" text-anchor="middle" font-size="12.5" fill="#a89a8c" opacity="0">multi-provider failover · key-pool rotation · audio assessment · live owner dashboard
    <animate attributeName="opacity" values="0;0.85" dur="1s" begin="1s" fill="freeze"/>
  </text>
</svg>
