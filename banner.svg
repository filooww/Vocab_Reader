<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none" role="img" aria-label="Vocab Reader">
  <defs>
    <!-- moving background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1310"/>
      <stop offset="0.5" stop-color="#241a14"/>
      <stop offset="1" stop-color="#11201d"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="24s" repeatCount="indefinite"/>
    </linearGradient>
    <!-- shimmering title gradient -->
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#df7142"/>
      <stop offset="0.5" stop-color="#f2b07e"/>
      <stop offset="1" stop-color="#df7142"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0; -1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f5e54"/>
      <stop offset="1" stop-color="#2f8b7c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .t  { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 800; }
      .sub{ font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; }
      .w  { font-family: Georgia, 'Times New Roman', serif; font-style: italic; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="20" fill="none" stroke="#df7142" stroke-opacity="0.25" stroke-width="2"/>

  <!-- floating vocabulary words — kept in the TOP band & side margins so they never cross the text -->
  <g class="w" font-size="20" fill="#df7142">
    <text x="70"   y="110" opacity="0">serendipity
      <animate attributeName="y" values="110;22" dur="9s" begin="0s"   repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.45;0.45;0" dur="9s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="1010" y="110" opacity="0" fill="#2f8b7c">eloquent
      <animate attributeName="y" values="110;18" dur="11s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" dur="11s" begin="1.5s" repeatCount="indefinite"/>
    </text>
    <text x="210"  y="112" opacity="0" fill="#f2b07e">ubiquitous
      <animate attributeName="y" values="112;26" dur="10s" begin="3s"   repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.38;0.38;0" dur="10s" begin="3s" repeatCount="indefinite"/>
    </text>
    <text x="950"  y="108" opacity="0" fill="#df7142">nuance
      <animate attributeName="y" values="108;30" dur="8s"  begin="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.45;0.45;0" dur="8s" begin="4.5s" repeatCount="indefinite"/>
    </text>
    <text x="120"  y="108" opacity="0" fill="#2f8b7c">cadence
      <animate attributeName="y" values="108;20" dur="12s" begin="2s"   repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.36;0.36;0" dur="12s" begin="2s" repeatCount="indefinite"/>
    </text>
    <text x="1050" y="112" opacity="0" fill="#f2b07e">lucid
      <animate attributeName="y" values="112;28" dur="9.5s" begin="6s"  repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.42;0.42;0" dur="9.5s" begin="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- kicker -->
  <text class="sub" x="600" y="92" text-anchor="middle" font-size="15" letter-spacing="7" fill="#df7142">
    V O C A B U L A R Y · R E A D E R
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- main title -->
  <text class="t" x="600" y="170" text-anchor="middle" font-size="74" fill="url(#title)" filter="url(#glow)">
    Vocab Reader
  </text>

  <!-- animated underline -->
  <line x1="360" y1="196" x2="840" y2="196" stroke="url(#teal)" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="480" stroke-dashoffset="480">
    <animate attributeName="stroke-dashoffset" values="480;0" dur="1.4s" begin="0.4s" fill="freeze"/>
  </line>

  <!-- subtitle -->
  <text class="sub" x="600" y="240" text-anchor="middle" font-size="20" fill="#e9e2d8">
    AI reading · IELTS Writing &amp; Speaking · SAT — powered by your own free AI key
    <animate attributeName="opacity" values="0;0;1" dur="2s" fill="freeze"/>
  </text>


  <!-- pulsing dots -->
  <g>
    <circle cx="565" cy="276" r="4" fill="#df7142"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0s"   repeatCount="indefinite"/></circle>
    <circle cx="600" cy="276" r="4" fill="#df7142"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="635" cy="276" r="4" fill="#df7142"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/></circle>
  </g>
</svg>
